<!DOCTYPE html>
<html>
<head>
    <title>Jarvis Core V3.6 - Final Dashboard</title>
    <style>
        :root { --main: #00ff00; --bg: #0a0a0a; --panel: #121212; }
        body { background: var(--bg); color: var(--main); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .dashboard { width: 850px; border: 2px solid var(--main); padding: 25px; border-radius: 15px; background: var(--panel); box-shadow: 0 0 30px #004400; }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; font-weight: bold; color: cyan; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .display { background: #000; padding: 20px; border-radius: 10px; border-left: 5px solid var(--main); margin-top: 15px; }
        .label { color: #555; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; }
        .content { font-size: 1.8rem; color: #fff; min-height: 50px; margin-top: 8px; line-height: 1.4; }
        #status { color: #ff00ff; font-weight: 900; }
    </style>
    <script>
        setInterval(function(){
            fetch('/data').then(res => res.json()).then(data => {
                document.getElementById('q').innerText = data.query;
                document.getElementById('r').innerText = data.response;
                document.getElementById('cpu').innerText = "CPU: " + data.cpu + "%";
                document.getElementById('ram').innerText = "RAM: " + data.ram + "%";
                document.getElementById('status').innerText = data.status;
                if(data.status == "OFFLINE") document.getElementById('status').style.color = "red";
            });
        }, 1200);
    </script>
</head>
<body>
    <div class="dashboard">
        <h1 style="text-align:center; letter-spacing:10px; margin-top:0;">JARVIS CORE V3</h1>
        <div class="stats">
            <div id="cpu">CPU: 0%</div>
            <div id="ram">RAM: 0%</div>
            <div>STATUS: <span id="status">ACTIVE</span></div>
        </div>
        <div class="display">
            <span class="label">User Command</span>
            <div id="q" class="content">Listening...</div>
        </div>
        <div class="display">
            <span class="label">Jarvis Intelligence</span>
            <div id="r" class="content">Awaiting instructions, Suraj.</div>
        </div>
        <p style="text-align: center; color: #333; font-size: 10px; margin-top: 20px;">Developed by Suraj Sahani | B.Sc CS | 2026</p>
    </div>
</body>
</html>
